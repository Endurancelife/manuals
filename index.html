<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />

  <style>
    /* --- Base Typography & Structure --- */
    body {
      background-color: var(--background);
      color: var(--textColor);
      font-family: "Mark Pro", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      transition: background-color 0.3s, color 0.3s;
    }

    /* --- Root Page Overrides (Hidden Sidebar & Layout) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 1012px !important;
      margin: 0 auto;
      padding-top: 40px;
    }
    body.is-root-page .markdown-section h1 a {
      pointer-events: none;
      color: var(--textColor);
      text-decoration: none;
    }

    /* --- Top Navigation & Dark Mode Toggle Alignment --- */
    body .app-nav {
      position: absolute;
      right: 65px; 
      top: 20px; 
      margin: 0;
      z-index: 999;
    }
    body .app-nav ul li {
      margin-left: 15px;
    }
    
    /* Dark/Light Mode Strictly Locked to Top Right */
    #docsify-darklight-theme {
      position: fixed !important;
      top: 15px !important; 
      right: 15px !important;
      left: auto !important; 
      margin: 0 !important;
      z-index: 99999 !important; /* Bumped to ensure it sits above everything */
    }

    /* FIX: Mobile Nav Adjustments & Unclickable Moon Fix */
    @media (max-width: 768px) {
      body .app-nav {
        right: 0 !important;
        left: 0 !important;
        top: 25px !important;
        width: 100% !important;
        text-align: center;
        padding: 0;
        pointer-events: none; /* Stops the invisible container from blocking the moon icon */
      }
      body .app-nav ul {
        pointer-events: auto; /* Re-enables clicks specifically on the links */
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      body .app-nav ul li {
        margin: 0;
      }
      body .app-nav a {
        font-size: 13px;
      }
      .markdown-section {
        padding-top: 60px !important; 
      }
    }

    /* --- Root Page Event Tiles --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .event-tile {
      display: block;
      padding: 16px 24px;
      background: var(--background);
      border: 1px solid var(--borderColor);
      border-radius: 6px;
      text-align: left;
      text-decoration: none !important;
      color: var(--accent) !important;
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.1s ease, border-color 0.1s ease;
    }
    .event-tile:hover {
      background-color: var(--codeBackgroundColor);
      text-decoration: underline !important;
    }

    /* --- Sidebar & Navigation Styling --- */
    .sidebar {
      background-color: var(--codeBackgroundColor);
      border-right: 1px solid var(--borderColor);
      padding-top: 70px !important; /* FIX: Pushes Search box down so Hamburger doesn't overlap it! */
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--textColor);
      padding: 0 20px;
      margin: 10px 0 15px 0;
    }
    .sidebar-back-link {
      display: block;
      padding: 0 20px;
      margin-bottom: 25px;
      font-size: 13px;
      color: var(--sidebarSublink);
      text-decoration: none;
      transition: color 0.2s;
    }
    .sidebar-back-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Sub-menu Layout */
    .sidebar ul li ul {
      padding-left: 15px !important;
      margin-top: 5px !important;
    }
    .sidebar ul li ul li {
      padding: 2px 0 !important;
      list-style-type: none !important; 
    }
    .sidebar ul li ul li::before {
      display: none !important; 
    }
    .sidebar ul li ul li a {
      font-size: 13px !important;
      padding: 2px 0 !important;
    }
    .sidebar ul li a {
      font-size: 14px;
      padding: 6px 20px;
      color: var(--sidebarSublink);
    }
    .sidebar ul li.active > a {
      color: var(--accent);
      font-weight: 600;
      background-color: transparent;
      border-right: none;
    }

    /* --- Rounded Search Box --- */
    .search {
      border-bottom: none !important;
      padding: 15px 20px;
    }
    .search input {
      background-color: var(--background);
      color: var(--textColor);
      border: 1px solid var(--borderColor) !important;
      border-radius: 20px !important;
      padding: 8px 16px;
      font-family: inherit;
      box-shadow: none !important; 
      outline: none !important;
      transition: border-color 0.2s;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* --- FIX: Restored Hamburger with X Animation --- */
    body .sidebar-toggle {
      background-color: var(--background) !important;
      border: 1px solid var(--borderColor) !important;
      border-left: none !important;
      border-radius: 0 6px 6px 0 !important; 
      width: 44px !important; 
      height: 44px !important;
      top: 15px !important;
      left: 0 !important; 
      bottom: auto !important;
      right: auto !important;
      padding: 12px 10px !important; /* Restored to Docsify defaults so X rotates correctly */
      box-shadow: 2px 2px 8px rgba(0,0,0,0.05) !important;
      z-index: 9999 !important;
      transition: all 0.3s ease !important;
    }
    body .sidebar-toggle span {
      background-color: var(--textColor) !important;
    }
    
    /* FIX: Move X to the right side of the menu when OPEN on Mobile */
    @media (max-width: 768px) {
      body.close .sidebar-toggle {
        left: 240px !important; /* Moves button to the right side of the sidebar */
        background-color: transparent !important; /* Blends it seamlessly into the sidebar */
        border: none !important;
        box-shadow: none !important;
      }
    }

    /* --- Pagination Cards --- */
    .pagination-item {
      border: 1px solid var(--borderColor) !important; 
      border-radius: 8px;
      padding: 16px 20px;
      background: var(--background);
      transition: border-color 0.2s, transform 0.2s;
      margin-top: 40px;
    }
    .pagination-item:hover {
      border-color: var(--accent) !important;
      transform: translateY(-2px);
    }
    .pagination-item-title {
      font-size: 16px !important;
      color: var(--textColor) !important; 
      font-weight: 600 !important;
      margin-top: 4px !important;
    }
    .pagination-item-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sidebarSublink);
    }

    /* --- Global Markdown Styling --- */
    .markdown-section {
      max-width: 850px;
    }
    .markdown-section h1 { 
      font-size: 32px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--borderColor); 
      padding-bottom: 8px; 
      margin-bottom: 16px;
    }
    .markdown-section h2 { 
      font-size: 24px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--borderColor); 
      padding-bottom: 8px; 
      margin-top: 24px;
      margin-bottom: 16px;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--accent);
      background: var(--codeBackgroundColor);
      color: var(--textColor);
      padding: 16px;
      border: 1px solid var(--borderColor);
      border-left-width: 4px;
      border-radius: 6px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div id="app">Loading EnduranceLife Manuals...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      search: {
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results found.',
        depth: 3
      },

      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },

      tabs: {
        persist    : true,
        sync       : true,
        theme      : 'classic',
        tabComments: true,
        tabHeadings: true
      },

      darklightTheme: {
        defaultTheme: 'light',
        light: {
          accent: '#c1272d',              
          background: '#ffffff',          
          textColor: '#24292f',           
          sidebarSublink: '#57606a',      
          borderColor: '#d0d7de',         
          codeBackgroundColor: '#f6f8fa', 
          toogleBackground: '#ffffff'
        },
        dark: {
          accent: '#c1272d',              
          background: '#0d1117',          
          textColor: '#c9d1d9',           
          sidebarSublink: '#8b949e',      
          borderColor: '#30363d',         
          codeBackgroundColor: '#161b22', 
          toogleBackground: '#0d1117'
        }
      },

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (vm.route.path === '/') {
              document.body.classList.add('is-root-page');
            } else {
              document.body.classList.remove('is-root-page');
            }
            return html;
          });

          hook.doneEach(function() {
            const searchInput = document.querySelector('.search input');
            if (searchInput && searchInput.value) {
              searchInput.value = '';
              searchInput.dispatchEvent(new Event('input', { bubbles: true })); 
            }
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
</body>
</html>
