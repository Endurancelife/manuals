<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />

  <style>
    /* --- Base Typography & Structure --- */
    body {
      background-color: var(--background);
      color: var(--textColor);
      font-family: "Mark Pro", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      transition: background-color 0.3s, color 0.3s;
    }

    /* --- Root Page Overrides (Hidden Sidebar & Layout) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 1012px !important;
      margin: 0 auto;
      padding-top: 40px;
    }
    body.is-root-page .markdown-section h1 a {
      pointer-events: none;
      color: var(--textColor);
      text-decoration: none;
    }

    /* --- Top Navigation & Dark Mode Toggle Alignment --- */
    body .app-nav {
      position: absolute;
      right: 65px; 
      top: 20px; 
      margin: 0;
      z-index: 999;
    }
    body .app-nav ul li {
      margin-left: 15px;
    }
    
    /* Dark/Light Mode Strictly Locked to Top Right & Always Clickable */
    #docsify-darklight-theme {
      position: fixed !important;
      top: 15px !important; 
      right: 15px !important;
      left: auto !important; 
      margin: 0 !important;
      z-index: 99999 !important; 
      pointer-events: auto !important;
    }

    /* FIX: Mobile Nav Shrink (Stops invisible overlaps on Moon/Hamburger) */
    @media (max-width: 768px) {
      body .app-nav {
        top: 25px !important;
        left: 60px !important;  /* Leaves room for the Hamburger */
        right: 60px !important; /* Leaves room for the Moon */
        width: auto !important; /* Prevents stretching */
        text-align: center;
        padding: 0 !important;
      }
      body .app-nav ul {
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      body .app-nav ul li {
        margin: 0;
      }
      body .app-nav a {
        font-size: 13px;
      }
      .markdown-section {
        padding-top: 60px !important; 
      }
    }

    /* --- Root Page Event Tiles --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .event-tile {
      display: block;
      padding: 16px 24px;
      background: var(--background);
      border: 1px solid var(--borderColor);
      border-radius: 6px;
      text-align: left;
      text-decoration: none !important;
      color: var(--accent) !important;
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.1s ease, border-color 0.1s ease;
    }
    .event-tile:hover {
      background-color: var(--codeBackgroundColor);
      text-decoration: underline !important;
    }

    /* --- Sidebar & Navigation Styling --- */
    .sidebar {
      background-color: var(--codeBackgroundColor);
      border-right: 1px solid var(--borderColor);
      padding-top: 70px !important; /* Pushes Search box down below the Hamburger */
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--textColor);
      padding: 0 20px;
      margin: 10px 0 15px 0;
    }
    .sidebar-back-link {
      display: block;
      padding: 0 20px;
      margin-bottom: 25px;
      font-size: 13px;
      color: var(--sidebarSublink);
      text-decoration: none;
      transition: color 0.2s;
    }
    .sidebar-back-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Sub-menu Layout */
    .sidebar ul li ul {
      padding-left: 15px !important;
      margin-top: 5px !important;
    }
    .sidebar ul li ul li {
      padding: 2px 0 !important;
      list-style-type: none !important; 
    }
    .sidebar ul li ul li::before {
      display: none !important; 
    }
    .sidebar ul li ul li a {
      font-size: 13px !important;
      padding: 2px 0 !important;
    }
    .sidebar ul li a {
      font-size: 14px;
      padding: 6px 20px;
      color: var(--sidebarSublink);
    }
    .sidebar ul li.active > a {
      color: var(--accent);
      font-weight: 600;
      background-color: transparent;
      border-right: none;
    }

    /* --- Rounded Search Box --- */
    .search {
      border-bottom: none !important;
      padding: 15px 20px;
    }
    .search input {
      background-color: var(--background);
      color: var(--textColor);
      border: 1px solid var(--borderColor) !important;
      border-radius: 20px !important;
      padding: 8px 16px;
      font-family: inherit;
      box-shadow: none !important; 
      outline: none !important;
      transition: border-color 0.2s;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* --- FIX: Restored Native Hamburger & X Animation --- */
    body .sidebar-toggle {
      background-color: var(--background) !important;
      border: 1px solid var(--borderColor) !important;
      border-left: none !important;
      border-radius: 0 6px 6px 0 !important; 
      top: 15px !important;
      bottom: auto !important;
      /* By removing explicit widths, heights, and flexbox overrides, Docsify can calculate its X animation properly again */
    }

      background-color: var(--textColor) !important
