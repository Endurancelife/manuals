<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* ==========================================================================
       1. GLOBAL BRANDING & TYPOGRAPHY
       ========================================================================== */
    :root {
      --theme-color: #d60d28; /* Signature Endurancelife Red */
    }

    body, .sidebar, input[type="search"] {
      font-family: 'Lato', 'Helvetica Neue', sans-serif !important;
      -webkit-font-smoothing: antialiased;
    }

    .markdown-section {
      font-size: 16.5px !important;
      line-height: 1.7 !important;
      color: #222222 !important;
    }

    /* ==========================================================================
       2. MASTER SIDEBAR PANEL STYLING
       ========================================================================== */
    .sidebar {
      background-color: #ffffff !important;
      border-right: 1px solid #eeeeee !important;
    }

    /* Natural-Flow Layout Configuration for Images inside the Sidebar */
    .sidebar img {
      max-width: 160px !important;
      height: auto !important;
      margin: 20px auto 10px auto !important;
      display: block !important;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    /* Active Sidebar Section Highlights */
    .sidebar ul li.active > a {
      color: #d60d28 !important;
      font-weight: 700 !important;
      border-left: 4px solid #d60d28 !important;
      padding-left: 11px !important;
    }

    /* ==========================================================================
       3. SUBTLE UTILITY BACKLINK (Small, Muted, Well-Positioned)
       ========================================================================== */
    .sidebar a[href*="endurancelife.com"] {
      display: block !important;
      width: 75% !important;
      margin: 10px auto 25px auto !important; /* Positions it with perfect breathing room below the logo */
      padding: 6px 10px !important;
      font-size: 12px !important; /* Clean, downscaled size */
      font-weight: 600 !important;
      color: #777777 !important; /* Understated, soft grey text */
      background-color: #f9f9f9 !important; /* Soft backdrop pane */
      border: 1px solid #e5e5e5 !important; /* Light accent border border */
      border-radius: 20px !important; /* Modern elegant pill shape */
      text-align: center !important;
      text-decoration: none !important;
      transition: all 0.2s ease-in-out !important;
    }

    /* Subtle brand response on interaction */
    .sidebar a[href*="endurancelife.com"]:hover {
      color: #d60d28 !important; /* Gently illuminates brand red on hover */
      background-color: #ffffff !important;
      border-color: #d60d28 !important;
      box-shadow: 0 2px 8px rgba(214, 13, 40, 0.08) !important;
    }

    /* ==========================================================================
       4. CLEAN ENGINE SEARCH INTERFACE (No Blue Focus Glow)
       ========================================================================== */
    .search input {
      border: 1px solid #e0e0e0 !important;
      background-color: #f9f9f9 !important;
      box-shadow: none !important;
      transition: all 0.25s ease-in-out !important;
      border-radius: 4px !important;
    }

    .search input:focus {
      outline: none !important;
      box-shadow: 0 0 8px rgba(214, 13, 40, 0.2) !important;
      border: 1px solid #d60d28 !important;
      background-color: #ffffff !important;
    }

    /* ==========================================================================
       5. CONTENT RENDER MODULES (Headers, Tables & Callouts)
       ========================================================================== */
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      color: #111111 !important;
      font-weight: 700 !important;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 8px;
      margin-top: 2.5em;
    }

    /* High-Performance Event Grid Data Tables */
    .markdown-section table {
      display: table !important;
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 20px 0 !important;
    }

    .markdown-section th {
      background-color: #f5f5f5 !important;
      font-weight: 700 !important;
      border: 1px solid #e0e0e0 !important;
    }

    .markdown-section td {
      border: 1px solid #eeeeee !important;
    }

    /* Safety Advisory Callouts */
    .markdown-section blockquote {
      border-left: 4px solid #d60d28 !important;
      background-color: #fff5f4 !important;
      color: #333333 !important;
      padding: 15px !important;
      border-radius: 0 4px 4px 0;
    }
  </style>
</head>
<body>

  <div id="app">Loading manual...</div>

 <script>
    window.$docsify = {
      loadSidebar: true,          // Compiles layout from the active folder's _sidebar.md
      loadNavbar: true,           // ENABLES GLOBAL TOP DROPDOWN MENU
      subMaxLevel: 3,             // Extracts header depths dynamically for inner sub-menus
      
      // AUTO-ROUTING SEARCH SEPARATION
      search: {
        maxAge: 86400000, 
        paths: 'auto',            // Crucial: Only indexes files linked in the ACTIVE sidebar
        placeholder: 'Search this manual...',
        noData: 'No results found!',
        depth: 3
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

</body>
</html>
