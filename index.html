<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* --- GitHub Docs Color Palette & Typography --- */
    :root {
      --theme-color: #0969da;      /* GitHub Blue */
      --text-color: #24292f;       /* GitHub Dark Gray Text */
      --bg-color: #ffffff;         /* Pure White */
      --sidebar-bg: #f6f8fa;       /* GitHub Sidebar Light Gray */
      --border-color: #d0d7de;     /* GitHub Subtle Border */
    }

   body {
      background-color: var(--bg-color);
      color: var(--text-color);
      /* Updated Font Stack */
      font-family: "Mark Pro", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    /* --- Root Page Overrides (Hidden Sidebar & Left Alignment) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 1012px !important; /* GitHub Container Width */
      margin: 0 auto;
      padding-top: 40px;
    }
    body.is-root-page .app-nav {
      position: absolute;
      right: 40px;
      left: auto;
      width: auto;
    }

    /* Kill the anchor link behavior on the main root H1 */
    body.is-root-page .markdown-section h1 a {
      pointer-events: none;
      color: var(--text-color);
      text-decoration: none;
    }

    /* --- Root Page Tiles (GitHub Directory Style) --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .event-tile {
      display: block;
      padding: 16px 24px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      text-align: left;
      text-decoration: none !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.1s ease;
    }
    .event-tile:hover {
      background-color: #f3f4f6;
      border-color: var(--border-color); /* Keep border static */
      text-decoration: underline !important;
    }

    /* --- Sidebar Overrides --- */
    .sidebar {
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      padding-top: 20px;
    }
    .sidebar .app-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-color);
      text-align: left;
      padding: 0 20px;
    }
    .sidebar h1, .sidebar h2, .sidebar h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
      margin-top: 24px;
      margin-bottom: 8px;
      padding: 0 20px;
    }
    .sidebar ul li a {
      font-size: 14px;
      padding: 6px 20px;
      color: #57606a;
    }
    .sidebar ul li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      background-color: transparent;
      border-right: none;
    }

    /* GitHub Style Secondary Button for "Back to Website" */
    .sidebar-back-btn {
      display: inline-block;
      margin: 10px 20px 20px 20px;
      padding: 5px 16px;
      background-color: #f6f8fa;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      color: #24292f;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
      transition-property: color, background-color, border-color;
      box-shadow: 0 1px 0 rgba(27, 31, 36, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .sidebar-back-btn:hover {
      background-color: #f3f4f6;
      border-color: rgba(27, 31, 36, 0.15);
      color: #24292f;
    }

    /* --- Global Content Styling (GitHub Markdown Flavor) --- */
    .markdown-section {
      max-width: 850px;
    }
    .markdown-section h1 { 
      font-size: 32px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--border-color); 
      padding-bottom: 8px; 
      margin-bottom: 16px;
    }
    .markdown-section h2 { 
      font-size: 24px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--border-color); 
      padding-bottom: 8px; 
      margin-top: 24px;
      margin-bottom: 16px;
    }
    .markdown-section h3 {
      font-size: 20px;
      font-weight: 600;
    }
    
    /* GitHub Style Callouts/Blockquotes */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: var(--bg-color);
      color: #57606a;
      padding: 16px;
      border: 1px solid var(--border-color);
      border-left-width: 4px;
      border-radius: 6px;
      margin: 16px 0;
    }
    .markdown-section blockquote p {
      margin: 0;
      font-size: 14px;
    }
    
    /* Clean up the search box */
    .search {
      border-bottom: 1px solid var(--border-color);
      padding: 10px 20px;
    }
    .search input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color) !important;
      border-radius: 6px;
      padding: 6px 12px;
    }
  </style>
</head>
<body>
  <div id="app">Loading EnduranceLife Manuals...</div>
  <script>
    window.$docsify = {
      name: 'Endurancelife', // This renders top left of the sidebar
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      // Lane-Disciplined Scoped Search
      search: {
        paths: 'auto',
        placeholder: 'Search this manual...',
        noData: 'No results found.',
        depth: 3
      },

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (vm.route.path === '/') {
              document.body.classList.add('is-root-page');
            } else {
              document.body.classList.remove('is-root-page');
            }
            return html;
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
