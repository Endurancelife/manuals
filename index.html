<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #c1272d; /* Endurancelife Red */
      --text-color: #333333;
      --bg-color: #fdfdfd;
      --sidebar-bg: #f5f5f5;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- Root Page Overrides (Hidden Sidebar) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 900px !important;
      margin: 0 auto;
      padding-top: 60px;
    }
    body.is-root-page .app-nav {
      left: 0;
      text-align: center;
      width: 100%;
    }

    /* --- Root Page Tiles --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    .event-tile {
      display: block;
      padding: 30px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 8px;
      text-align: center;
      text-decoration: none !important;
      color: var(--text-color);
      font-weight: bold;
      font-size: 1.2rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .event-tile:hover {
      border-color: var(--theme-color);
      color: var(--theme-color);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(193, 39, 45, 0.1);
    }

    /* --- Sidebar & Typography Overrides --- */
    .sidebar {
      background-color: var(--sidebar-bg);
      border-right: 1px solid #eaeaea;
    }
    .sidebar h1, .sidebar h2, .sidebar h3 {
      font-weight: 800;
      color: #000;
      margin-bottom: 10px;
      padding: 0 15px;
    }
    .sidebar-back-btn {
      display: block;
      margin: 15px;
      padding: 10px;
      background: transparent;
      border: 1px solid #ccc;
      text-align: center;
      color: #555;
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 600;
      transition: all 0.2s;
    }
    .sidebar-back-btn:hover {
      border-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    /* Global Content Styling */
    .markdown-section h1 { font-weight: 900; letter-spacing: -0.5px; }
    .markdown-section h2 { border-bottom: 2px solid #eaeaea; padding-bottom: 8px; }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: #fff5f5;
      color: #444;
    }
  </style>
</head>
<body>
  <div id="app">Loading EnduranceLife Manuals...</div>
  <script>
    window.$docsify = {
      name: 'Endurancelife',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      // Lane-Disciplined Scoped Search
      search: {
        paths: 'auto',
        placeholder: 'Search this manual...',
        noData: 'No results found.',
        depth: 3
      },

      plugins: [
        // Custom Plugin: Toggle Sidebar visibility based on root path
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (vm.route.path === '/') {
              document.body.classList.add('is-root-page');
            } else {
              document.body.classList.remove('is-root-page');
            }
            return html;
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
