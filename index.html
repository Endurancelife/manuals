<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />

  <style>
    /* --- Base Typography & Structure --- */
    body {
      background-color: var(--background);
      color: var(--textColor);
      font-family: "Mark Pro", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      transition: background-color 0.3s, color 0.3s;
    }

    /* --- Root Page Overrides (Hidden Sidebar & Layout) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 1012px !important;
      margin: 0 auto;
      padding-top: 40px;
    }
    body.is-root-page .markdown-section h1 a {
      pointer-events: none;
      color: var(--textColor);
      text-decoration: none;
    }
    body.is-root-page .markdown-section h1 {
      border-bottom: none !important;
    }

    /* --- Dark Mode Toggle Alignment --- */
    #docsify-darklight-theme {
      position: fixed !important;
      top: 15px !important; 
      right: 15px !important;
      left: auto !important; 
      margin: 0 !important;
      z-index: 99999 !important; 
      pointer-events: auto !important;
    }

    /* Prevents mobile content from crashing into corner icons */
    @media (max-width: 768px) {
      .markdown-section {
        padding-top: 60px !important; 
      }
    }

    /* --- Root Page Event Tiles --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .event-tile {
      display: block;
      padding: 16px 24px;
      background: var(--background);
      border: 1px solid var(--borderColor);
      border-radius: 6px;
      text-align: left;
      text-decoration: none !important;
      color: var(--textColor) !important; 
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.1s ease, border-color 0.1s ease;
    }
    .event-tile:hover {
      background-color: var(--codeBackgroundColor);
      text-decoration: underline !important;
    }

    /* --- Sidebar & Navigation Styling (GitHub Flat Theme) --- */
    .sidebar {
      background-color: var(--background) !important; 
      border-right: 1px solid var(--borderColor);
      padding-top: 70px !important; 
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    /* FIX: Subdued, Indented, and Spaced External Links */
.sidebar-back-link {
      display: block;
      padding: 0 20px;
      margin-top: 0;
      margin-bottom: -8px; /* Negative margin pulls it physically closer */
      line-height: 1;      /* Removes the invisible vertical padding around the text */
      font-size: 12px;
      font-weight: 400;
      color: var(--sidebarSublink);
      text-decoration: none;
      transition: color 0.2s;
    }
    .sidebar-back-link:hover {
      color: var(--accent);
    }

    /* FIX: Perfectly Balanced Title Spacing */
    .sidebar-title {
      font-size: 22px; 
      font-weight: 700;
      color: var(--textColor);
      padding: 0 20px;
      margin: 0 0 16px 0; /* Perfect bottom spacing for the Title */
    }

    .sidebar-divider {
      border-top: 1px solid var(--borderColor);
      margin: 0 0 16px 0; /* Matches the spacing below the title */
    }

    /* Sub-menu Layout */
    .sidebar ul li ul {
      padding-left: 15px !important;
      margin-top: 5px !important;
    }
    .sidebar ul li ul li {
      padding: 2px 0 !important;
      list-style-type: none !important; 
    }
    .sidebar ul li ul li::before {
      display: none !important; 
    }
    .sidebar ul li ul li a {
      font-size: 13px !important;
      padding: 2px 0 !important;
    }
    .sidebar ul li a {
      font-size: 14px;
      padding: 8px 20px; 
      color: var(--sidebarSublink);
    }
    
    .sidebar ul li.active > a {
      color: var(--textColor) !important; 
      font-weight: 600;
      background-color: var(--codeBackgroundColor) !important; 
      border-left: 4px solid var(--accent) !important; 
      padding-left: 16px !important; 
      border-right: none;
      border-radius: 0 6px 6px 0; 
    }

    /* --- Rounded Search Box --- */
    .search {
      border-bottom: none !important;
      padding: 15px 20px;
    }
    .search input {
      background-color: var(--background);
      color: var(--textColor);
      border: 1px solid var(--borderColor) !important;
      border-radius: 20px !important;
      padding: 8px 16px;
      font-family: inherit;
      box-shadow: none !important; 
      outline: none !important;
      transition: border-color 0.2s;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* --- BULLETPROOF CUSTOM HAMBURGER MENU --- */
    body .sidebar-toggle {
      background-color: var(--background) !important;
      border: 1px solid var(--borderColor) !important;
      border-radius: 6px !important;
      width: 42px !important;
      height: 42px !important;
      top: 15px !important;
      left: 15px !important;
      bottom: auto !important;
      right: auto !important;
      padding: 0 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      z-index: 99999 !important;
      position: fixed !important;
      cursor: pointer;
    }
    
    body .sidebar-toggle-button {
      width: 18px !important;
      height: 14px !important;
      position: relative !important;
      padding: 0 !important;
      margin: 0 !important;
      display: block !important;
    }
    
    body .sidebar-toggle span {
      background-color: var(--textColor) !important;
      width: 100% !important;
      height: 2px !important;
      border-radius: 2px !important;
      position: absolute !important;
      left: 0 !important;
      margin: 0 !important;
      transition: all 0.3s ease-in-out !important;
    }
    
    /* DESKTOP LOGIC (>= 769px): .close = Sidebar Hidden */
    @media screen and (min-width: 769px) {
      /* Sidebar hidden -> Show Hamburger */
      body.close .sidebar-toggle span:nth-child(1) { top: 0px !important; transform: rotate(0) !important; }
      body.close .sidebar-toggle span:nth-child(2) { top: 6px !important; opacity: 1 !important; }
      body.close .sidebar-toggle span:nth-child(3) { top: 12px !important; transform: rotate(0) !important; }
      /* Sidebar visible -> Show X */
      body:not(.close) .sidebar-toggle span:nth-child(1) { top: 6px !important; transform: rotate(45deg) !important; }
      body:not(.close) .sidebar-toggle span:nth-child(2) { top: 6px !important; opacity: 0 !important; }
      body:not(.close) .sidebar-toggle span:nth-child(3) { top: 6px !important; transform: rotate(-45deg) !important; }
    }

    /* MOBILE LOGIC (<= 768px): The Docsify class logic is inverted here! */
    @media screen and (max-width: 768px) {
      /* Sidebar hidden -> Show Hamburger */
      body:not(.close) .sidebar-toggle span:nth-child(1) { top: 0px !important; transform: rotate(0) !important; }
      body:not(.close) .sidebar-toggle span:nth-child(2) { top: 6px !important; opacity: 1 !important; }
      body:not(.close) .sidebar-toggle span:nth-child(3) { top: 12px !important; transform: rotate(0) !important; }
      /* Sidebar visible -> Show X */
      body.close .sidebar-toggle span:nth-child(1) { top: 6px !important; transform: rotate(45deg) !important; }
      body.close .sidebar-toggle span:nth-child(2) { top: 6px !important; opacity: 0 !important; }
      body.close .sidebar-toggle span:nth-child(3) { top: 6px !important; transform: rotate(-45deg) !important; }
    }

    /* --- Pagination Cards --- */
    .pagination-item {
      border: 1px solid var(--borderColor) !important; 
      border-radius: 8px;
      padding: 16px 20px;
      background: var(--background);
      transition: border-color 0.2s, transform 0.2s;
      margin-top: 40px;
    }
    .pagination-item:hover {
      border-color: var(--textColor) !important; 
      transform: translateY(-2px);
    }
    .pagination-item-title {
      font-size: 16px !important;
      color: var(--textColor) !important; 
      font-weight: 600 !important;
      margin-top: 4px !important;
    }
    .pagination-item-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sidebarSublink);
    }

    /* --- Global Markdown Styling --- */
    .markdown-section {
      max-width: 850px;
    }
    .markdown-section h1 { 
      font-size: 32px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--borderColor); 
      padding-bottom: 8px; 
      margin-bottom: 16px;
    }
    .markdown-section h2 { 
      font-size: 24px; 
      font-weight: 600; 
      border-bottom: 1px solid var(--borderColor); 
      padding-bottom: 8px; 
      margin-top: 24px;
      margin-bottom: 16px;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--accent);
      background: var(--codeBackgroundColor);
      color: var(--textColor);
      padding: 16px;
      border: 1px solid var(--borderColor);
      border-left-width: 4px;
      border-radius: 6px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div id="app">Loading EnduranceLife Manuals...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      search: {
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results found.',
        depth: 3
      },

      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },

      tabs: {
        persist    : true,
        sync       : true,
        theme      : 'classic',
        tabComments: true,
        tabHeadings: true
      },

      darklightTheme: {
        defaultTheme: 'light',
        light: {
          accent: '#c1272d',              
          background: '#ffffff',          
          textColor: '#24292f',           
          sidebarSublink: '#57606a',      
          borderColor: '#d0d7de',         
          codeBackgroundColor: '#f6f8fa', 
          toggleBackground: '#ffffff'
        },
        dark: {
          accent: '#c1272d',              
          background: '#0d1117',          
          textColor: '#c9d1d9',           
          sidebarSublink: '#8b949e',      
          borderColor: '#30363d',         
          codeBackgroundColor: '#161b22', 
          toggleBackground: '#0d1117'
        }
      },

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (vm.route.path === '/') {
              document.body.classList.add('is-root-page');
            } else {
              document.body.classList.remove('is-root-page');
            }
            return html;
          });

          hook.doneEach(function() {
            const searchInput = document.querySelector('.search input');
            if (searchInput && searchInput.value) {
              searchInput.value = '';
              searchInput.dispatchEvent(new Event('input', { bubbles: true })); 
            }
          });
        }
      ]
    }
  </script>

<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify-tabs/dist/index.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts/dist/docsify-plugin-flexible-alerts.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme/dist/index.min.js"></script>
  
</body>
</html>
