    /* --- Base Typography & Structure --- */
    body {
      background-color: var(--background);
      color: var(--textColor);
      font-family: "Mark Pro", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;

    /* --- Root Page Overrides (Hidden Sidebar & Layout) --- */
    body.is-root-page .sidebar, 
    body.is-root-page .sidebar-toggle {
      display: none !important;
    }
    body.is-root-page .content {
      left: 0 !important;
      max-width: 1012px !important;
      margin: 0 auto;
      padding-top: 40px;
    }
    body.is-root-page .markdown-section h1 a {
      pointer-events: none;
      color: var(--textColor);
      text-decoration: none;
    }

    /* --- Top Navigation & Dark Mode Toggle Fixes --- */
    body .app-nav {

      left: auto;
      width: auto;
      z-index: 999;
    }
    #docsify-darklight-theme {
      position: fixed !important;
      top: 15px !important;
      right: 25px !important;
      margin: 0 !important;
      z-index: 9999 !important;
    }

    /* --- Root Page Event Tiles --- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .event-tile {
      display: block;
      padding: 16px 24px;
      background: var(--background);
      border: 1px solid var(--borderColor);
      border-radius: 6px;
      text-align: left;
      text-decoration: none !important;
      color: var(--accent) !important;
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.1s ease, border-color 0.1s ease;
    }
    .event-tile:hover {
      background-color: var(--codeBackgroundColor);
      text-decoration: underline !important;
    }
