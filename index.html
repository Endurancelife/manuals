<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endurancelife Race Manuals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root { --theme-color: #d60d28; }
    body, .sidebar, input[type="search"] { font-family: 'Lato', sans-serif !important; -webkit-font-smoothing: antialiased; }
    .markdown-section { font-size: 16.5px !important; line-height: 1.7 !important; color: #222222 !important; }
    
    /* Sidebar Navigation Configuration */
    .sidebar { background-color: #ffffff !important; border-right: 1px solid #eeeeee !important; }
    .sidebar-nav img { max-width: 140px !important; height: auto !important; margin: 10px auto !important; display: block; border: none; }
    .sidebar-nav strong a { display: block; text-align: center; font-size: 14px; color: #777777 !important; text-decoration: none; margin-bottom: 20px; }
    .sidebar-nav strong a:hover { color: #d60d28 !important; }
    .sidebar ul li.active > a { color: #d60d28 !important; font-weight: 700 !important; border-left: 4px solid #d60d28 !important; padding-left: 11px !important; }
    
    /* Clean Search Bar (No Blue Glow) */
    .search input { border: 1px solid #e0e0e0 !important; background-color: #f9f9f9 !important; box-shadow: none !important; border-radius: 4px !important; }
    .search input:focus { outline: none !important; box-shadow: 0 0 8px rgba(214, 13, 40, 0.2) !important; border: 1px solid #d60d28 !important; background-color: #ffffff !important; }
    
    /* Headings, Tables & Callouts styling */
    .markdown-section h1, .markdown-section h2, .markdown-section h3 { color: #111111 !important; font-weight: 700 !important; }
    .markdown-section h2 { border-bottom: 1px solid #eaeaea; padding-bottom: 8px; margin-top: 2.5em; }
    .markdown-section table { display: table !important; width: 100% !important; border-collapse: collapse !important; margin: 20px 0 !important; }
    .markdown-section th { background-color: #f5f5f5 !important; font-weight: 700 !important; border: 1px solid #e0e0e0 !important; }
    .markdown-section td { border: 1px solid #eeeeee !important; }
    .markdown-section blockquote { border-left: 4px solid #d60d28 !important; background-color: #fff5f4 !important; color: #333333 !important; padding: 15px !important; border-radius: 0 4px 4px 0; }
  </style>
</head>
<body>
  <div id="app">Loading manual...</div>
  <script>
    window.$docsify = {
      homepage: 'test-manual.md', // Your default starting file
      loadSidebar: true,          // Enables your custom navigation menu
      subMaxLevel: 3,             // Automatically grabs ## headings from files
      search: 'auto'              // Turns on full-text searching
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
